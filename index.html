<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #stream { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; }
    </style>
</head>
<body>

    <img id="stream" alt="Connecting...">

<img id="stream" style="width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair;"
     onerror="setTimeout(connect, 2000)"> <script>
    const GIST_RAW = "https://gist.githubusercontent.com/ujimaccha2014-collab/38955fda60dddd6a96b70f198c804272/raw/url.txt";
    
    async function connect() {
        try {
            const res = await fetch(GIST_RAW + "?t=" + Math.random());
            const url = (await res.text()).trim();
            const img = document.getElementById("stream");
            img.src = url + "/video_feed";
            console.log("接続先:", url);
        } catch(e) {
            console.log("URL取得失敗、再試行します...");
            setTimeout(connect, 3000);
        }
    }
    
    connect();
    setInterval(connect, 10000); // 10秒おきに最新URLを確認
</script>
</body>
</html>
