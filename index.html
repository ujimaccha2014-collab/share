<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Remote Desktop</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #stream { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; }
    </style>
</head>
<body>

    <img id="stream" alt="Connecting..." onerror="setTimeout(connect, 2000)">

    <script>
        // あなたの新しいGist URL
        const GIST_RAW = "https://gist.githubusercontent.com/ujimaccha2014-collab/38955fda60dddd6a96b70f198c804272/raw/url.txt";
        let baseUrl = ""; // 取得したURLを保持する変数

        async function connect() {
            try {
                const res = await fetch(GIST_RAW + "?t=" + Math.random());
                baseUrl = (await res.text()).trim();
                
                const img = document.getElementById("stream");
                // URLが変わったときだけsrcを更新（チラつき防止）
                if (img.src !== baseUrl + "/video_feed") {
                    img.src = baseUrl + "/video_feed";
                }
                console.log("接続完了:", baseUrl);
            } catch(e) {
                console.log("URL取得失敗、再試行します...");
                setTimeout(connect, 3000);
            }
        }

        // --- キーボード操作送信 ---
        document.addEventListener('keydown', (e) => {
            if (!baseUrl) return;
            fetch(baseUrl + "/keyboard", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    key: e.key, 
                    ctrl: e.ctrlKey, 
                    shift: e.shiftKey,
                    alt: e.altKey
                })
            });
            // ブラウザ側のショートカット（F5やCtrl+Wなど）を無効化したい場合は以下を有効に
            // e.preventDefault(); 
        });

        // --- マウスクリック送信 ---
        document.getElementById('stream').addEventListener('mousedown', (e) => {
            if (!baseUrl) return;
            const img = e.target;
            const rect = img.getBoundingClientRect();
            
            // クリックされた位置を割合（0.0～1.0）で計算
            const data = {
                x: (e.clientX - rect.left) / rect.width,
                y: (e.clientY - rect.top) / rect.height
            };
            
            fetch(baseUrl + "/click", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
        });

        // 最初の一歩
        connect();
        // 10秒おきに最新のURL（再起動対策）を確認
        setInterval(connect, 10000); 
    </script>
</body>
</html>
