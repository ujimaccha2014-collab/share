<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Secure Remote Desktop</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #panel { background: #222; padding: 8px; display: flex; gap: 15px; align-items: center; color: white; position: relative; z-index: 100; }
        select, button, input { background: #444; color: white; border: 1px solid #666; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        #stream-container { width: 100vw; height: calc(100vh - 45px); display: flex; justify-content: center; align-items: center; }
        #stream { max-width: 100%; max-height: 100%; object-fit: contain; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="panel">
        <div>
            表示モニター: 
            <select id="monitor-select" onchange="changeMonitor()">
                <option value="1">モニター 1</option>
            </select>
        </div>
        <div>
            クリップボード:
            <input type="text" id="clip-text" placeholder="送信するテキストを入力">
            <button onclick="sendClipboard()">PCへ送信</button>
            <button onclick="getClipboard()">PCから取得</button>
        </div>
    </div>

    <div id="stream-container">
        <img id="stream" alt="Connecting..." onerror="setTimeout(connect, 2000)">
    </div>

    <script>
// 1. まず鍵をチェックして、なければ即ログイン画面へ
        const savedKey = sessionStorage.getItem("SECRET_KEY");
        if (!savedKey) {
            window.location.href = "login.html";
        }
        const SECRET_KEY = savedKey; // これが唯一の宣言
        
        // ★ ここにあった const SECRET_KEY = prompt(...) は削除した！

        const GIST_RAW = "https://gist.githubusercontent.com/ujimaccha2014-collab/38955fda60dddd6a96b70f198c804272/raw/url.txt";
        let baseUrl = ""; 
        let currentMonitor = 1;
        let isMouseDown = false;
        let lastHoverTime = 0;
        const HOVER_INTERVAL = 100;

        async function connect() {
            try {
                const res = await fetch(GIST_RAW + "?t=" + Math.random());
                baseUrl = (await res.text()).trim();
                
                const mRes = await fetch(`${baseUrl}/monitors?key=${encodeURIComponent(SECRET_KEY)}`);
                const mData = await mRes.json();
                const select = document.getElementById("monitor-select");
                
                if(select.options.length <= 1) {
                    select.innerHTML = "";
                    for(let i = 1; i <= mData.count; i++) {
                        const opt = document.createElement("option");
                        opt.value = i; opt.innerText = `モニター ${i}`;
                        if(i === currentMonitor) opt.selected = true;
                        select.appendChild(opt);
                    }
                }

                updateStream();
            } catch(e) {
                setTimeout(connect, 3000);
            }
        }

        function updateStream() {
            if(!baseUrl) return;
            const img = document.getElementById("stream");
            img.src = `${baseUrl}/video_feed?monitor=${currentMonitor}&key=${encodeURIComponent(SECRET_KEY)}&t=${Date.now()}`;
        }

function changeMonitor() {
    currentMonitor = parseInt(document.getElementById("monitor-select").value);
    updateStream();
}

// クリップボード同期
async function sendClipboard() {
    const text = document.getElementById("clip-text").value;
    await fetch(`${baseUrl}/clipboard?key=${encodeURIComponent(SECRET_KEY)}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text: text })
            });
    alert("PCへ送信しました");
}

async function getClipboard() {
    const res = await fetch(`${baseUrl}/clipboard?key=${encodeURIComponent(SECRET_KEY)}`);
    const data = await res.json();
    document.getElementById("clip-text").value = data.text;
    navigator.clipboard.writeText(data.text).catch(() => {});
    alert("PCから取得しました");
}

const img = document.getElementById('stream');

function sendMouseEvent(action, e) {
    if (!baseUrl || !img.complete) return;
    const rect = img.getBoundingClientRect();
    
    const data = {
        action: action,
        monitor: currentMonitor,
        x: (e.clientX - rect.left) / rect.width,
        y: (e.clientY - rect.top) / rect.height
    };
    
    if (data.x < 0 || data.x > 1 || data.y < 0 || data.y > 1) return;

    // ★ここ！マウス操作にも正確に付与
    fetch(`${baseUrl}/mouse?key=${encodeURIComponent(SECRET_KEY)}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).catch(()=>{});
}

img.addEventListener('mousedown', (e) => {
    isMouseDown = true;
    sendMouseEvent('down', e);
    e.preventDefault();
});

img.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastHoverTime > HOVER_INTERVAL) {
        sendMouseEvent('move', e);
        lastHoverTime = now;
    }
});

window.addEventListener('mouseup', (e) => {
    if (isMouseDown) {
        isMouseDown = false;
        sendMouseEvent('up', e);
    }
});

// キーボード操作
document.addEventListener('keydown', (e) => {
    if (!baseUrl || document.activeElement.id === 'clip-text') return;
    // ★ここ！キーボード操作にも正確に付与
    fetch(`${baseUrl}/keyboard?key=${encodeURIComponent(SECRET_KEY)}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ key: e.key, ctrl: e.ctrlKey, shift: e.shiftKey, alt: e.altKey })
    }).catch(()=>{});
    if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Backspace","Tab"].includes(e.key)) e.preventDefault();
});

connect();
setInterval(connect, 15000);
    </script>
</body>
</html>
