<!DOCTYPE html>
<html>
<body>
    <h1>ライブ配信中</h1>
    <img id="stream" style="width: 100%; max-width: 800px;">
    
    <script>
        const URL_FILE = "https://raw.githubusercontent.com/ujimaccha2014-collab/share/main/url.txt?cache=" + new Date().getTime();

        fetch(URL_FILE)
            .then(res => res.text())
            .then(url => {
                const targetUrl = url.trim();
                if (targetUrl.startsWith("http")) {
                    document.getElementById("stream").src = targetUrl + "/video_feed";
                }
            });
    </script>
</body>
</html>
