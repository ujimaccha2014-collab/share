<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #stream { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; }
    </style>
</head>
<body>

    <img id="stream" alt="Connecting...">

<img id="stream" style="width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair;">
<script>
    const GIST_RAW = "https://gist.githubusercontent.com/ujimaccha2014-collab/2599566f648c5e8f9e47d61dff7a9cef/raw/url.txt";
    async function connect() {
        const res = await fetch(GIST_RAW + "?t=" + Math.random());
        const url = (await res.text()).trim();
        document.getElementById("stream").src = url + "/video_feed";
        
        // 操作イベント設定
        document.addEventListener('keydown', (e) => {
            fetch(url + "/keyboard", {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key:e.key})});
        });
        document.getElementById('stream').addEventListener('mousedown', (e) => {
            const rect = e.target.getBoundingClientRect();
            fetch(url + "/click", {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({x:(e.clientX-rect.left)/rect.width, y:(e.clientY-rect.top)/rect.height})});
        });
    }
    connect();
    setInterval(connect, 5000); // 5秒ごとに最新URLをチェック
</script>
</body>
</html>
