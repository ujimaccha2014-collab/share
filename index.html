<!DOCTYPE html>
<html>
<body>
    <h1>ライブ配信中</h1>
<img id="stream" style="width: 100%; max-width: 800px;">

<script>
    // GitHubのrawURLに、タイムスタンプを秒単位までつけてリクエスト
    const timestamp = Math.floor(Date.now() / 1000); 
    const urlFile = `https://raw.githubusercontent.com/ujimaccha2014-collab/share/main/url.txt?t=${timestamp}`;
    
    fetch(urlFile, { cache: "reload" }) // キャッシュを無視してリロードする指定
        .then(response => response.text())
        .then(data => {
            const newUrl = data.trim();
            console.log("現在読み込んだURL:", newUrl);
            document.getElementById("stream").src = newUrl + "/video_feed";
        });
    fetch("https://raw.githubusercontent.com/ujimaccha2014-collab/share/main/url.txt?t=" + Math.random())
    .then(r => r.text())
    .then(t => console.log("取得できたURL:", t));
</script>
</body>
</html>
