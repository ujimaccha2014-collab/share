<!DOCTYPE html>
<html>
<body>
    <h1>ライブ配信中</h1>
<img id="stream" style="width: 100%; max-width: 800px;">

<script>
    // GitHubのURL（?nocache=... をつけて強制的に毎回読み直させる）
    const urlFile = "https://raw.githubusercontent.com/ujimaccha2014-collab/share/main/url.txt?nocache=" + Math.random();
    
    fetch(urlFile, { cache: "no-store" }) // キャッシュを一切させない設定
        .then(response => response.text())
        .then(data => {
            const newUrl = data.trim();
            console.log("読み込んだ最新URL:", newUrl);
            document.getElementById("stream").src = newUrl + "/video_feed";
        })
        .catch(err => console.error("URL取得失敗:", err));
</script>
</body>
</html>
