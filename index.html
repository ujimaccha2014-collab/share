<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #stream { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; }
    </style>
</head>
<body>

    <img id="stream" alt="Connecting...">

    <script>
        // ★ここにあなたのGistの「Raw」URLを入れてください
        const GIST_URL = "https://gist.githubusercontent.com/ujimaccha2014-collab/2599566f648c5e8f9e47d61dff7a9cef/raw/6c68c306ad0096cd6a377e2b7a1f7fc769401527/url.txt";

        function connect() {
            // キャッシュを強制回避
            fetch(GIST_URL + "?t=" + Math.random())
                .then(r => r.text())
                .then(url => {
                    const baseUrl = url.trim();
                    document.getElementById("stream").src = baseUrl + "/video_feed";
                    console.log("Connected to:", baseUrl);
                    setupControls(baseUrl);
                });
        }

        function setupControls(baseUrl) {
            // キーボード操作の送信
            document.addEventListener('keydown', (e) => {
                fetch(baseUrl + "/keyboard", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        key: e.key,
                        ctrl: e.ctrlKey,
                        shift: e.shiftKey
                    })
                });
            });
        }

        connect();
    </script>
</body>
</html>
