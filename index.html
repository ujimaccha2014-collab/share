<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote Desktop</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #stream { width: 100vw; height: 100vh; object-fit: contain; cursor: crosshair; }
    </style>
</head>
<body>

    <img id="stream" alt="Connecting...">

<script>
    // あなたのGistのRaw URL（?t=...を付けてキャッシュを破壊します）
    const GIST_URL = "https://gist.githubusercontent.com/ujimaccha2014-collab/2599566f648c5e8f9e47d61dff7a9cef/raw/6c68c306ad0096cd6a377e2b7a1f7fc769401527/url.txt";

    function connect() {
        fetch(GIST_URL + "?nocache=" + new Date().getTime(), {
            cache: "no-store", // ブラウザにキャッシュさせない
            headers: {
                "Pragma": "no-cache",
                "Cache-Control": "no-cache"
            }
        })
        .then(r => r.text())
        .then(data => {
            const url = data.trim();
            document.getElementById("stream").src = url + "/video_feed";
            console.log("接続完了:", url);
        })
        .catch(err => console.error("接続エラー:", err));
    }
    
    // ページを開いた時と、3秒おきにURLを再チェックする（これで手動更新不要！）
    connect();
    setInterval(connect, 3000); 
</script>
</body>
</html>
